name: Weekly Game Update

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Stockfish
        run: sudo apt-get install -y stockfish

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install chess

      - name: Run update pipeline
        run: python3 scripts/update_games.py

      - name: Commit updated game data
        run: |
          git config user.name "chess-coach-bot"
          git config user.email "tk@noice.so"
          git add public/game_data.json
          git diff --cached --quiet || git commit -m "chore: weekly game data update $(date +%Y-%m-%d)"

      - name: Push changes
        run: git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
